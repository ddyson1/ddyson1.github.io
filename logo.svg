<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Original logo for devindyson.com — a globe mid-plot: a pen-plotter is still
       drawing the world, one latitude line at a time. Not the Wikipedia logo. -->
  <g fill="none" stroke="#54595d" stroke-width="1.4" stroke-linecap="round">
    <!-- sphere outline, unfinished at the top-right -->
    <path d="M 79.8 43.7 A 36 36 0 1 1 52.3 20.5" />
    <!-- plotted latitude lines, bowing with the tilt of the globe -->
    <path d="M 29.5 88 A 69 69 0 0 0 62.5 88" />
    <path d="M 23.4 84 A 96 96 0 0 0 68.6 84" />
    <path d="M 18.3 79 A 118 118 0 0 0 73.7 79" />
    <path d="M 14.3 73 A 134 134 0 0 0 77.7 73" />
    <path d="M 11.4 66 A 145 145 0 0 0 80.6 66" />
    <path d="M 10.1 58 A 152 152 0 0 0 81.9 58" />
    <path d="M 10.5 50 A 150 150 0 0 0 81.5 50" />
    <path d="M 12.8 42 A 140 140 0 0 0 79.2 42" />
  </g>
  <!-- the line currently being drawn (wet ink, slightly darker) -->
  <path d="M 16.8 35 A 124 124 0 0 0 52 38.4" fill="none" stroke="#202122" stroke-width="1.4" stroke-linecap="round" />
  <!-- the pen, nib on the line -->
  <g transform="translate(0,4.9)" stroke="#202122" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round">
    <path d="M 52 33.5 L 54.1 28.6 L 53.2 27.7 L 62.4 18.5 L 67 23.1 L 57.8 32.3 L 56.9 31.4 Z" fill="#ffffff" />
    <line x1="52" y1="33.5" x2="55.5" y2="30" />
    <line x1="64.2" y1="25.9" x2="59.6" y2="21.3" />
  </g>
</svg>
